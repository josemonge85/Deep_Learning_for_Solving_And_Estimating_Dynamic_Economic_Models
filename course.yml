# Canonical machine-readable course manifest.
# COURSE_MAP.md and the public README are derived from this file.
#
# Schema:
#   lecture: int
#   block:   str (B00..B16 or T1/T2/T3)
#   title:   str
#   folder:  str (path relative to repo root)
#   script:  list[{section, title}]   chapters and sections of lecture_script.tex
#   slides:  list[str]                 slide deck paths relative to folder
#   notebooks: {core: [], exercises: [], solutions: [], extensions: []}
#   prereqs: list[str]                 block IDs (e.g. B05) that must come first
#   compute: enum {cpu-light, cpu-standard, gpu-recommended, gpu-required}
#   time:    enum {short, standard, long}
#   checkpoint: str                    one-line concrete task
#   smoke_disabled: bool (default false)

course:
  title: "Deep Learning for Solving and Estimating Dynamic Models in Economics and Finance"
  author: "Simon Scheidegger"
  audience: "PhD students in computational/quantitative economics and finance"
  repository: "https://github.com/sischei/Deep_Learning_for_Solving_And_Estimating_Dynamic_Economic_Models"

lectures:
  - lecture: 1
    block: B00
    title: "Python primer"
    folder: lectures/lecture_01_B00_python_primer
    script:
      - {section: "Preface", title: "Preface"}
      - {section: "How to Read", title: "How to Read This Script"}
      - {section: "Notation", title: "Notation and Symbols"}
      - {section: "Execution Map", title: "Execution Map"}
      - {section: "Appendix E", title: "Reproducibility Information"}
    slides: []
    notebooks:
      core:
        - "code/jupyter_intro.ipynb"
        - "code/python_basics_1_python_as_calculator.ipynb"
        - "code/python_basics_2_vars_and_types.ipynb"
        - "code/python_basics_3_basic_tuples_and_lists.ipynb"
        - "code/python_basics_4_basics_of_strings_and_printing.ipynb"
        - "code/python_basics_5_conditionals.ipynb"
        - "code/python_basics_6_loops.ipynb"
        - "code/python_basics_7_functions.ipynb"
        - "code/python_basics_8_Classes.ipynb"
        - "code/python_basics_9_numpy_linalg.ipynb"
        - "code/python_basics_10_python_data_analysis_lib.ipynb"
        - "code/python_basics_11_basic_plotting.ipynb"
      exercises: []
      solutions: []
      extensions: []
    prereqs: []
    compute: cpu-light
    time: short
    checkpoint: "Run the Python primer notebooks end-to-end on your local machine."

  - lecture: 2
    block: B01
    title: "Introduction to deep learning"
    folder: lectures/lecture_02_B01_intro_deep_learning
    script:
      - {section: "1.1-1.4", title: "Foundations and function approximation"}
      - {section: "1.5-1.9", title: "Optimization, depth, and regularization"}
      - {section: "1.10-1.11", title: "Generalization, sequence models"}
    slides: ["slides/01_Intro_to_DeepLearning.pdf"]
    notebooks:
      core:
        - "code/lecture_02_B01_01_BasicML_intro.ipynb"
        - "code/lecture_02_B01_02_GradientDescent_and_StochasticGradientDescent.ipynb"
        - "code/lecture_02_B01_03_Double_Descent.ipynb"
        - "code/lecture_02_B01_04_Gentle_DNN.ipynb"
        - "code/lecture_02_B01_06_PyTorch_intro.ipynb"
        - "code/lecture_02_B01_07_Genz_Approximation_and_Loss_Functions.ipynb"
        - "code/lecture_02_B01_08_MLP_LSTM_Transformer_Edgeworth_Cycles.ipynb"
      exercises: []
      solutions: []
      extensions:
        - "code/lecture_02_B01_05_Tensorboard.ipynb"
        - "code/lecture_02_B01_09_Transformer_InContext_AR1.ipynb"
    prereqs: [B00]
    compute: cpu-standard
    time: long
    checkpoint: "Train an MLP, an LSTM, and a small Transformer on Edgeworth cycles, and read off the memory ladder."

  - lecture: 3
    block: B02
    title: "Deep Equilibrium Nets"
    folder: lectures/lecture_03_B02_deep_equilibrium_nets
    script:
      - {section: "2.1-2.4", title: "DEQN theory and motivation"}
      - {section: "2.5", title: "Deterministic Brock-Mirman"}
      - {section: "2.6", title: "Quadrature for conditional expectations"}
      - {section: "2.4, 2.9", title: "Constraints and residual kernels"}
    slides: ["slides/02_DeepEquilibriumNets.pdf"]
    notebooks:
      core:
        - "code/lecture_03_B02_01_Brock_Mirman_1972_DEQN.ipynb"
        - "code/lecture_03_B02_02_Brock_Mirman_Uncertainty_DEQN.ipynb"
        - "code/lecture_03_B02_05_StochasticBM_LossComparison.ipynb"
      exercises:
        - "code/lecture_03_B02_03_DEQN_Exercises_Blanks.ipynb"
      solutions:
        - "code/lecture_03_B02_04_DEQN_Exercises_Solutions.ipynb"
      extensions: []
    prereqs: [B01]
    compute: cpu-standard
    time: long
    checkpoint: "Train a stochastic Brock-Mirman DEQN with Fischer-Burmeister complementarity and verify against the closed-form policy."

  - lecture: 4
    block: B03
    title: "IRBC with DEQNs"
    folder: lectures/lecture_04_B03_irbc_with_deqns
    script: [{section: "Chapter 3", title: "International real business cycle"}]
    slides: ["slides/03_IRBC.pdf"]
    notebooks:
      core: ["code/lecture_04_B03_01_IRBC_DEQN.ipynb"]
      exercises: []
      solutions: []
      extensions: []
    prereqs: [B02]
    compute: gpu-recommended
    time: long
    checkpoint: "Train an N-country IRBC DEQN and reproduce the symmetric steady state."

  - lecture: 5
    block: B04
    title: "Architecture search and loss balancing"
    folder: lectures/lecture_05_B04_nas_loss_normalization
    script: [{section: "Chapter 4", title: "Neural architecture search and loss normalization"}]
    slides:
      - "slides/04_Neural_Architecture_Search.pdf"
      - "slides/05_Loss_Normalization.pdf"
    notebooks:
      core:
        - "code/lecture_05_B04_02_NAS_Random_Search_10D.ipynb"
        - "code/lecture_05_B04_03_NAS_RandomSearch_Hyperband.ipynb"
        - "code/lecture_05_B04_04_Loss_Normalization.ipynb"
      exercises: ["code/lecture_05_B04_05_IRBC_Exercise.ipynb"]
      solutions: []
      extensions: []
    prereqs: [B03]
    compute: gpu-recommended
    time: long
    checkpoint: "Run random search on a 10-D NAS problem and compare ReLoBRaLo, SoftAdapt, and GradNorm."

  - lecture: 6
    block: B05
    title: "Automatic differentiation for DEQNs"
    folder: lectures/lecture_06_B05_autodiff_for_deqns
    script:
      - {section: "2.7", title: "Automatic differentiation"}
      - {section: "Appendix B", title: "Matrix calculus"}
    slides: ["slides/05b_AutoDiff_for_DEQN.pdf"]
    notebooks:
      core:
        - "code/lecture_06_B05_01_AutoDiff_Analytical_Examples.ipynb"
        - "code/lecture_06_B05_02_Brock_Mirman_AutoDiff_DEQN.ipynb"
        - "code/lecture_06_B05_03_Brock_Mirman_Uncertainty_AutoDiff_DEQN.ipynb"
      exercises: []
      solutions: []
      extensions:
        - "code/lecture_06_B05_04_IRBC_AutoDiff_DEQN.ipynb"
    prereqs: [B02]
    compute: cpu-standard
    time: standard
    checkpoint: "Derive a Lagrangian primitive analytically and recover its gradient via two-tape autodiff."

  - lecture: 7
    block: B06
    title: "Sequence-space DEQNs"
    folder: lectures/lecture_07_B06_sequence_space_deqns
    script: [{section: "6.7", title: "Sequence-space DEQNs"}]
    slides: ["slides/06_SequenceSpace_DEQNs.pdf"]
    notebooks:
      core:
        - "code/lecture_07_B06_05_SequenceSpace_BrockMirman.ipynb"
        - "code/lecture_07_B06_06_SequenceSpace_KrusellSmith.ipynb"
      exercises: []
      solutions: []
      extensions:
        - "code/lecture_07_B06_05b_SequenceSpace_IRBC.ipynb"
        - "code/lecture_07_B06_KrusellSmith_Tutorial_CPU.ipynb"
    prereqs: [B05]
    compute: gpu-recommended
    time: long
    checkpoint: "Train a sequence-space DEQN on Brock-Mirman with an 80-step shock history."

  - lecture: 8
    block: B07
    title: "OLG models with DEQNs"
    folder: lectures/lecture_08_B07_olg_models_deqns
    script:
      - {section: "5.1-5.5", title: "OLG with DEQNs"}
      - {section: "5.6", title: "Large OLG benchmark"}
    slides: ["slides/07_OLG_Models_DEQNs.pdf"]
    notebooks:
      core:
        - "code/lecture_08_B07_07_OLG_Analytic_DEQN.ipynb"
        - "code/lecture_08_B07_08_OLG_Benchmark_DEQN.ipynb"
      exercises: ["code/lecture_08_B07_09_OLG_Exercise.ipynb"]
      solutions: []
      extensions: []
    prereqs: [B05]
    compute: gpu-recommended
    time: long
    checkpoint: "Train an analytic OLG DEQN and reproduce the 56-period benchmark with borrowing constraints via Fischer-Burmeister."

  - lecture: 9
    block: B08
    title: "Heterogeneous agents and Young's method"
    folder: lectures/lecture_09_B08_heterogeneous_agents_youngs_method
    script:
      - {section: "6.1-6.3", title: "Heterogeneous agents I"}
      - {section: "6.4-6.6", title: "Heterogeneous agents II"}
    slides: ["slides/08_Heterogeneous_Agents_Youngs_Method.pdf"]
    notebooks:
      core:
        - "code/lecture_09_B08_10_Youngs_Method_Examples.ipynb"
        - "code/lecture_09_B08_11_Continuum_of_Agents_DEQN.ipynb"
      exercises: []
      solutions: []
      extensions:
        - "code/lecture_09_B08_12_KrusellSmith_DeepLearning.ipynb"
    prereqs: [B07]
    compute: gpu-recommended
    time: long
    checkpoint: "Run Young's histogram on Aiyagari and compare against a continuum-of-agents DEQN solution."

  - lecture: 10
    block: B09
    title: "Physics-informed neural networks"
    folder: lectures/lecture_10_B09_pinns
    script:
      - {section: "7.1-7.4", title: "PINN foundations"}
      - {section: "7.5-7.9", title: "Economic PDEs (HJB, Black-Scholes)"}
    slides: ["slides/06_PINNs.pdf"]
    notebooks:
      core:
        - "code/lecture_10_B09_01_ODE_PINN_ZeroBCs.ipynb"
        - "code/lecture_10_B09_02_ODE_PINN_SoftVsHardBCs.ipynb"
        - "code/lecture_10_B09_03_PDE_PINN_Poisson2D.ipynb"
        - "code/lecture_10_B09_04_Cake_Eating_HJB_PINN.ipynb"
        - "code/lecture_10_B09_05_Black_Scholes_PINN.ipynb"
      exercises: []
      solutions: []
      extensions: []
    prereqs: [B05]
    compute: cpu-standard
    time: long
    checkpoint: "Solve a 2-D Poisson PDE with a PINN; price a European call via Black-Scholes PINN."

  - lecture: 11
    block: B10
    title: "Continuous-time heterogeneous agents, theory"
    folder: lectures/lecture_11_B10_continuous_time_ha_theory
    script:
      - {section: "8.1-8.6", title: "HJB, KFE, master equation"}
      - {section: "Appendix C", title: "Ito calculus"}
    slides: ["slides/07_CT_Heterogeneous_Agents_Theory.pdf"]
    notebooks: {core: [], exercises: [], solutions: [], extensions: []}
    prereqs: [B09]
    compute: cpu-light
    time: standard
    checkpoint: "Write the HJB-KFE system for the Aiyagari model and identify each operator's role."

  - lecture: 12
    block: B11
    title: "Continuous-time heterogeneous agents, numerics"
    folder: lectures/lecture_12_B11_continuous_time_ha_numerics
    script: [{section: "8.7", title: "Numerical methods for CT-HA"}]
    slides: ["slides/08_CT_Heterogeneous_Agents_Numerical.pdf"]
    notebooks:
      core:
        - "code/lecture_12_B11_06_PE_Discrete_HJB_PINN.ipynb"
        - "code/lecture_12_B11_07_PE_Diffusion_HJB_PINN.ipynb"
        - "code/lecture_12_B11_08_Aiyagari_Continuous_Time_FD_and_PINN_PyTorch.ipynb"
      exercises: ["code/lecture_12_B11_09_PINN_Exercise.ipynb"]
      solutions: []
      extensions: []
    prereqs: [B10]
    compute: gpu-recommended
    time: long
    checkpoint: "Solve continuous-time Aiyagari via finite differences and PINN, and compare distributions."

  - lecture: 13
    block: B12
    title: "Surrogates and Gaussian processes"
    folder: lectures/lecture_13_B12_surrogates_and_gps
    script:
      - {section: "9.1-9.2", title: "Deep surrogates"}
      - {section: "9.3-9.6", title: "GPs and Bayesian active learning"}
      - {section: "9.7", title: "Active subspaces"}
      - {section: "9.8", title: "GP value-function iteration"}
      - {section: "9.9", title: "Deep kernels"}
      - {section: "9.10", title: "GPs among Bayesian cousins"}
    slides:
      - "slides/07_Surrogates_and_GPs.pdf"
      - "slides/gp_active_learning.pdf"
    notebooks:
      core:
        - "code/lecture_13_B12_01_Surrogate_Primer.ipynb"
        - "code/lecture_13_B12_02_GP_and_BAL.ipynb"
        - "code/lecture_13_B12_04_GP_Value_Function_Iteration.ipynb"
        - "code/lecture_13_B12_05_Active_Subspace_2D.ipynb"
        - "code/lecture_13_B12_06_Active_Subspace_10D.ipynb"
        - "code/lecture_13_B12_08_Deep_Kernel_Learning.ipynb"
      exercises: []
      solutions: []
      extensions:
        - "code/lecture_13_B12_07_Active_Subspace_Nonlinear.ipynb"
        - "code/lecture_13_B12_09_Deep_Active_Subspace_Ridge.ipynb"
        - "code/lecture_13_B12_10_Deep_AS_vs_Linear_AS_Borehole.ipynb"
    prereqs: [B01]
    compute: gpu-recommended
    time: long
    checkpoint: "Build a deep surrogate, fit a GP with Bayesian active learning, and apply linear/deep active subspaces to a 10-D test function."

  - lecture: 14
    block: B13
    title: "Structural estimation via SMM"
    folder: lectures/lecture_14_B13_structural_estimation_smm
    script: [{section: "Chapter 10", title: "Structural estimation via SMM"}]
    slides: ["slides/08_Exercise_Structural_Estimation.pdf"]
    notebooks:
      core: ["code/lecture_14_B13_03_Structural_Estimation_BM.ipynb"]
      exercises: []
      solutions: []
      extensions: ["code/lecture_14_B13_03b_Structural_Estimation_BM_Joint.ipynb"]
    prereqs: [B12]
    compute: cpu-standard
    time: long
    checkpoint: "Estimate rho, then jointly (beta, rho), in Brock-Mirman via SMM with a deep surrogate."

  - lecture: 15
    block: B14
    title: "Climate economics and integrated assessment models"
    folder: lectures/lecture_15_B14_climate_economics_iams
    script:
      - {section: "11.1-11.2", title: "IAMs and DICE"}
      - {section: "11.3", title: "DICE with DEQNs"}
    slides: ["slides/08_Climate_Economics_IAMs.pdf"]
    notebooks:
      core: ["code/lecture_15_B14_02_DICE_DEQN_Library_Port.ipynb"]
      exercises: ["code/lecture_15_B14_01_Climate_Exercise.ipynb"]
      solutions: []
      extensions: ["code/lecture_15_B14_03_Stochastic_DICE_DEQN.ipynb"]
    prereqs: [B05]
    compute: gpu-recommended
    time: long
    checkpoint: "Simulate the DICE carbon cycle and temperature dynamics, then solve deterministic CDICE with a DEQN."

  - lecture: 16
    block: B15
    title: "Deep uncertainty quantification and Pareto-improving climate policy"
    folder: lectures/lecture_16_B15_deep_uq_pareto_improving_policy
    script: [{section: "11.4-11.6", title: "Deep UQ for IAMs and constrained Pareto-improving policy"}]
    slides: ["slides/09_Deep_UQ_and_Optimal_Policies.pdf"]
    notebooks: {core: [], exercises: [], solutions: [], extensions: []}
    prereqs: [B14]
    compute: gpu-recommended
    time: long
    checkpoint: "Run a deep-UQ analysis on a stochastic IAM and identify constrained Pareto-improving carbon-tax policies."

  - lecture: 17
    block: B16
    title: "Course wrap-up"
    folder: lectures/lecture_17_B16_course_wrap_up
    script:
      - {section: "Chapter 12", title: "Synthesis and method choice"}
      - {section: "Appendix A", title: "Glossary"}
      - {section: "Appendix D", title: "Fixed points and Bellman"}
    slides: ["slides/10_Wrap_Up.pdf"]
    notebooks: {core: [], exercises: [], solutions: [], extensions: []}
    prereqs: [B15]
    compute: cpu-light
    time: short
    checkpoint: "Articulate when to choose DEQN, PINN, or GP/surrogate methods for a new problem and justify the trade-offs."

toolkits:
  - block: T1
    title: "Agentic research-coding loop"
    folder: toolkit/toolkit_01_T1_agentic_research_coding_loop
    insert_after: B04
    standalone: true
    compute: cpu-light
    time: standard
    checkpoint: "Set up a working agentic research-coding environment and complete exercises 1-3 of the prompt pack."

  - block: T2
    title: "Project memory, agents, and hooks"
    folder: toolkit/toolkit_02_T2_project_memory_agents_hooks
    insert_after: B11
    standalone: true
    compute: cpu-light
    time: standard
    checkpoint: "Author a CLAUDE.md, a custom skill, and a subagent for a research task you care about."

  - block: T3
    title: "Agentic programming, exercise handout"
    folder: toolkit/toolkit_03_T3_agentic_programming_exercises
    insert_after: T2
    standalone: true
    compute: cpu-light
    time: standard
    checkpoint: "Work through the workshop and self-study exercises that accompany toolkits T1 and T2."
